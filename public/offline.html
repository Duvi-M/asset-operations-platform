<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#141720" />
    <title>SGOI sin conexión</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0d0f12;
        --panel: #141720;
        --border: #252c3d;
        --text: #e2e8f0;
        --muted: #94a3b8;
        --accent: #f59e0b;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: "IBM Plex Sans", sans-serif;
        background: radial-gradient(circle at top, #1a1f2e 0%, var(--bg) 60%);
        color: var(--text);
      }

      main {
        width: min(100%, 420px);
        padding: 28px 24px;
        border: 1px solid var(--border);
        border-radius: 16px;
        background: rgba(20, 23, 32, 0.92);
        text-align: center;
        box-shadow: 0 24px 60px rgba(0, 0, 0, 0.35);
      }

      h1 {
        margin: 0 0 10px;
        font-size: 1.4rem;
      }

      p {
        margin: 0;
        color: var(--muted);
        line-height: 1.6;
      }

      .badge {
        display: inline-block;
        margin-bottom: 16px;
        padding: 6px 10px;
        border-radius: 999px;
        background: rgba(245, 158, 11, 0.12);
        color: var(--accent);
        font-size: 0.78rem;
        font-weight: 600;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="badge">Sin conexión</div>
      <h1>SGOI no está disponible ahora</h1>
      <p>La interfaz básica se puede abrir sin red, pero las llamadas al backend, cargas de evidencias, PDFs y QR siguen siendo online.</p>
    </main>
  </body>
</html>
