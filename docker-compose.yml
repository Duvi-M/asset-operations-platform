version: "3.9"

services:
  db:
    image: postgres:15-alpine
    container_name: asset_ops_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-asset_ops_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-asset_ops_pass}
      POSTGRES_DB: ${POSTGRES_DB:-asset_ops_db}
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-asset_ops_user} -d ${POSTGRES_DB:-asset_ops_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: asset_ops_api
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app/app
      - ./alembic:/app/alembic
      - ./alembic.ini:/app/alembic.ini
      - media_files:/app/media
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
  media_files:
